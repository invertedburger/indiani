name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      # Reuse the geocoding cache between runs so we don't re-query Nominatim.
      - name: Restore coords cache
        uses: actions/cache@v4
        with:
          path: results/coords.json
          key: indiani-coords-${{ hashFiles('restaurants.json') }}
          restore-keys: indiani-coords-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/test_data.py tests/test_build.py

      - name: Build site
        run: python run.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
